<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VidNest URL Extractor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #0a0c10;
    --surface:  #111318;
    --card:     #161b22;
    --border:   #21262d;
    --accent:   #58a6ff;
    --green:    #3fb950;
    --yellow:   #d29922;
    --red:      #f85149;
    --purple:   #bc8cff;
    --orange:   #ffa657;
    --cyan:     #39d3f5;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --dim:      #484f58;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* ── Grid background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: .35;
    pointer-events: none;
    z-index: 0;
  }

  main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ── Header ── */
  header { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
  .logo {
    width: 46px; height: 46px; border-radius: 10px;
    background: linear-gradient(135deg, #1f6feb 0%, #388bfd 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  h1 { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .badge {
    margin-left: auto;
    background: rgba(88,166,255,.12);
    border: 1px solid rgba(88,166,255,.3);
    color: var(--accent);
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  }

  /* ── Target card ── */
  .target-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .target-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .target-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }

  /* ── Button ── */
  #runBtn {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #1f6feb, #388bfd);
    border: none; border-radius: 8px;
    color: #fff; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600;
    padding: 10px 22px; cursor: pointer;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  #runBtn:hover:not(:disabled) { opacity: .88; }
  #runBtn:active:not(:disabled) { transform: scale(.97); }
  #runBtn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Timeline ── */
  .timeline {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px;
    margin-bottom: 24px; display: none;
  }
  .timeline.visible { display: block; }
  .timeline-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

  .tl-step {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0;
    opacity: 0; transform: translateX(-8px);
    transition: opacity .3s ease, transform .3s ease;
  }
  .tl-step.show { opacity: 1; transform: none; }
  .tl-dot {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface); border: 1px solid var(--dim); color: var(--muted);
  }
  .tl-dot.done { background: rgba(63,185,80,.15); border-color: var(--green); color: var(--green); }
  .tl-dot.spin  { border-color: var(--accent); color: var(--accent); animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tl-msg { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); }

  /* ── Timer ── */
  #timerWrap { display:none; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 24px; }
  #timerWrap.visible { display: block; }
  #timerNum {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px; font-weight: 700;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 40px rgba(88,166,255,.4);
  }
  #timerLabel { color: var(--muted); font-size: 12px; margin-top: 8px; }
  .timer-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 20px; overflow: hidden; }
  .timer-fill { height: 100%; background: var(--accent); transition: width 1s linear; }

  /* ── Stats row ── */
  .stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 130px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px;
  }
  .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
  }
  .filter-bar input {
    flex: 1; min-width: 200px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    padding: 8px 14px; outline: none;
    transition: border-color .2s;
  }
  .filter-bar input:focus { border-color: var(--accent); }
  .type-btn {
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all .2s; white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }
  .type-btn.active { background: rgba(88,166,255,.15); border-color: var(--accent); color: var(--accent); }

  /* ── Results table ── */
  #results { display: none; }
  #results.visible { display: block; }

  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .results-title { font-size: 13px; font-weight: 600; }
  #copyAllBtn {
    background: rgba(63,185,80,.12); border: 1px solid rgba(63,185,80,.3);
    color: var(--green); border-radius: 6px; padding: 6px 14px;
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'JetBrains Mono', monospace;
    transition: opacity .2s;
  }
  #copyAllBtn:hover { opacity: .8; }

  .url-list { display: flex; flex-direction: column; gap: 6px; }
  .url-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color .15s;
    animation: fadeIn .25s ease;
  }
  .url-item:hover { border-color: var(--dim); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .type-pill {
    flex-shrink: 0; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .type-anchor  { background: rgba(88,166,255,.15); color: var(--accent); }
  .type-script  { background: rgba(210,153,34,.15);  color: var(--yellow); }
  .type-link    { background: rgba(188,140,255,.15); color: var(--purple); }
  .type-image   { background: rgba(63,185,80,.15);  color: var(--green); }
  .type-iframe  { background: rgba(255,166,87,.15); color: var(--orange); }
  .type-inline  { background: rgba(57,211,245,.15); color: var(--cyan); }
  .type-media-source { background: rgba(248,81,73,.15); color: var(--red); }
  .type-lazy-src { background: rgba(188,140,255,.15); color: var(--purple); }

  .url-text {
    flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .url-label { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

  .icon-btn {
    flex-shrink: 0; background: none; border: none; cursor: pointer;
    color: var(--dim); padding: 4px; border-radius: 4px;
    transition: color .15s;
    font-size: 14px;
  }
  .icon-btn:hover { color: var(--text); }

  /* ── Error ── */
  .error-box {
    background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3);
    border-radius: 10px; padding: 16px 20px; color: var(--red);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    display: none;
  }
  .error-box.visible { display: block; }

  /* ── Responsive ── */
  @media(max-width: 600px) {
    .target-card { flex-direction: column; align-items: flex-start; }
    .stats { flex-direction: column; }
    #timerNum { font-size: 48px; }
  }
</style>
</head>
<body>
<main>
  <header>
    <div class="logo">🎬</div>
    <div>
      <h1>VidNest <span>URL Extractor</span></h1>
      <div style="font-size:12px;color:var(--muted);">Fetch · Wait · Extract · Analyse</div>
    </div>
    <div class="badge">Python + Flask</div>
  </header>

  <!-- Target -->
  <div class="target-card">
    <div style="flex:1">
      <div class="target-label">Target URL</div>
      <div class="target-url" id="targetDisplay">https://srtfile.github.io/vidnest/movie/254</div>
    </div>
    <button id="runBtn" onclick="runExtraction()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0zm-.5 4.5v7l5-3.5-5-3.5z"/></svg>
      Run Extraction
    </button>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Timeline -->
  <div class="timeline" id="timeline">
    <div class="timeline-title">⚡ Execution Log</div>
    <div id="tlSteps"></div>
  </div>

  <!-- Timer -->
  <div id="timerWrap">
    <div id="timerNum">5</div>
    <div id="timerLabel">seconds remaining — waiting for dynamic content</div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
  </div>

  <!-- Stats -->
  <div class="stats" id="statsRow" style="display:none">
    <div class="stat-card">
      <div class="stat-val" id="statTotal" style="color:var(--accent)">0</div>
      <div class="stat-lbl">Total URLs</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statAnchors" style="color:var(--accent)">0</div>
      <div class="stat-lbl">Anchor Links</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statInline" style="color:var(--cyan)">0</div>
      <div class="stat-lbl">Inline / JS</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statOther" style="color:var(--yellow)">0</div>
      <div class="stat-lbl">Assets & Other</div>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="results-header">
      <div class="results-title" id="resultsTitle">URLs</div>
      <button id="copyAllBtn" onclick="copyAll()">⎘ Copy All</button>
    </div>
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Filter URLs…" oninput="renderFiltered()"/>
      <div id="typeBtns"></div>
    </div>
    <div class="url-list" id="urlList"></div>
  </div>
</main>

<script>
  const API = ''; // same-origin: works locally and on Render
  let allUrls = [];
  let activeType = 'all';
  let timerInterval = null;

  // ── Type colour map ──
  const typeClass = {
    anchor: 'type-anchor', script: 'type-script', link: 'type-link',
    image: 'type-image', iframe: 'type-iframe', inline: 'type-inline',
    'media-source': 'type-media-source', 'lazy-src': 'type-lazy-src'
  };

  function addStep(msg, done=false, spin=false) {
    const tl = document.getElementById('tlSteps');
    const div = document.createElement('div');
    div.className = 'tl-step';
    const idx = tl.children.length + 1;
    div.innerHTML = `
      <div class="tl-dot ${done?'done':spin?'spin':''}">${done?'✓':spin?'↻':idx}</div>
      <div class="tl-msg">${msg}</div>`;
    tl.appendChild(div);
    requestAnimationFrame(() => div.classList.add('show'));
    return div;
  }

  function markDone(el, msg) {
    el.querySelector('.tl-dot').className = 'tl-dot done';
    el.querySelector('.tl-dot').textContent = '✓';
    if (msg) el.querySelector('.tl-msg').textContent = msg;
  }

  function startTimer(seconds) {
    const wrap = document.getElementById('timerWrap');
    const num  = document.getElementById('timerNum');
    const fill = document.getElementById('timerFill');
    wrap.classList.add('visible');
    let remaining = seconds;
    num.textContent = remaining;
    fill.style.width = '100%';

    return new Promise(resolve => {
      timerInterval = setInterval(() => {
        remaining--;
        num.textContent = remaining;
        fill.style.width = ((remaining / seconds) * 100) + '%';
        if (remaining <= 0) {
          clearInterval(timerInterval);
          wrap.classList.remove('visible');
          resolve();
        }
      }, 1000);
    });
  }

  function buildTypeButtons(byType) {
    const container = document.getElementById('typeBtns');
    container.innerHTML = '';
    const all = document.createElement('button');
    all.className = 'type-btn active'; all.textContent = 'All'; all.dataset.type = 'all';
    all.onclick = () => setType('all', all);
    container.appendChild(all);

    Object.keys(byType).sort().forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'type-btn'; btn.dataset.type = t;
      btn.textContent = `${t} (${byType[t].length})`;
      btn.onclick = () => setType(t, btn);
      container.appendChild(btn);
    });
  }

  function setType(type, btn) {
    activeType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFiltered();
  }

  function renderFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allUrls.filter(u =>
      (activeType === 'all' || u.type === activeType) &&
      (u.url.toLowerCase().includes(q) || u.label.toLowerCase().includes(q))
    );
    document.getElementById('resultsTitle').textContent =
      `${filtered.length} URL${filtered.length !== 1 ? 's' : ''} found`;
    renderList(filtered);
  }

  function renderList(urls) {
    const list = document.getElementById('urlList');
    list.innerHTML = '';
    urls.forEach((u, i) => {
      const item = document.createElement('div');
      item.className = 'url-item';
      item.style.animationDelay = Math.min(i * 15, 300) + 'ms';
      const cls = typeClass[u.type] || 'type-inline';
      item.innerHTML = `
        <span class="type-pill ${cls}">${u.type}</span>
        <span class="url-text" title="${u.url}">${u.url}</span>
        <span class="url-label" title="${u.label}">${u.label}</span>
        <button class="icon-btn" title="Copy URL" onclick="copyUrl('${u.url.replace(/'/g,"\\'")}', this)">⎘</button>
        <a href="${u.url}" target="_blank" rel="noopener" class="icon-btn" title="Open in new tab">↗</a>
      `;
      list.appendChild(item);
    });
  }

  function copyUrl(url, btn) {
    navigator.clipboard.writeText(url).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓'; btn.style.color = 'var(--green)';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    });
  }

  function copyAll() {
    const text = allUrls.map(u => u.url).join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyAllBtn');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = '⎘ Copy All', 2000);
    });
  }

  async function runExtraction() {
    const btn = document.getElementById('runBtn');
    btn.disabled = true;

    // Reset
    document.getElementById('errorBox').className = 'error-box';
    document.getElementById('tlSteps').innerHTML = '';
    document.getElementById('statsRow').style.display = 'none';
    document.getElementById('results').className = '';
    allUrls = [];

    const timeline = document.getElementById('timeline');
    timeline.classList.add('visible');

    // Step 1 — Navigating
    const s1 = addStep('Navigating to target URL…', false, true);

    let data;
    // The Flask backend handles the wait internally, but we show a client-side
    // visual timer while it processes. We fire the fetch, show timer, await both.
    const fetchPromise = fetch(`${API}/fetch`)
      .then(r => r.json());

    // Show timer visual (client side cosmetic — backend does real wait)
    markDone(s1, 'Request dispatched');
    const s2 = addStep('Page loading…', false, true);

    // Start a parallel cosmetic 5-second timer
    const timerPromise = startTimer(5);

    // Await the timer first (cosmetic UX)
    await timerPromise;

    markDone(s2, 'Page loaded');
    const s3 = addStep('Extracting URLs…', false, true);

    try {
      data = await fetchPromise;
    } catch(e) {
      markDone(s3, 'Failed');
      const eb = document.getElementById('errorBox');
      eb.textContent = `❌ Could not reach backend: ${e.message}. Make sure app.py is running on port 5050.`;
      eb.classList.add('visible');
      btn.disabled = false;
      return;
    }

    if (!data.success) {
      markDone(s3, 'Error');
      const eb = document.getElementById('errorBox');
      eb.textContent = `❌ ${data.error}`;
      eb.classList.add('visible');
      btn.disabled = false;
      return;
    }

    markDone(s3, `Extracted ${data.total} unique URLs`);
    addStep(`Page title: "${data.page_title}"`, true);

    allUrls = data.urls;

    // Stats
    const byType = data.by_type;
    document.getElementById('statTotal').textContent   = data.total;
    document.getElementById('statAnchors').textContent = (byType.anchor||[]).length;
    document.getElementById('statInline').textContent  = (byType.inline||[]).length;
    const other = data.total - (byType.anchor||[]).length - (byType.inline||[]).length;
    document.getElementById('statOther').textContent   = other;
    document.getElementById('statsRow').style.display  = 'flex';

    buildTypeButtons(byType);
    document.getElementById('results').classList.add('visible');
    renderFiltered();

    btn.disabled = false;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0zm-.5 4.5v7l5-3.5-5-3.5z"/></svg> Run Again`;
  }
</script>
</body>
</html>
